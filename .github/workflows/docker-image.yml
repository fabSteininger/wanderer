name: Build Docker Images and Upload Artifacts

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Build images using your Makefile
      - name: Build DB Docker image
        run: make db-build-docker

      - name: Build Web Docker image
        run: make web-build-docker

      # Save images as .tar files
      - name: Save DB image
        run: docker save -o db-image.tar wanderer-db:latest

      - name: Save Web image
        run: docker save -o web-image.tar wanderer-web:latest

      # Upload artifacts
      - name: Upload DB image artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-image
          path: db-image.tar

      - name: Upload Web image artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-image
          path: web-image.tar

