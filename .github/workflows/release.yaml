name: Publish Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  # Only run if the PR was merged AND it came from a release branch
  publish:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Version Output
        id: get_version
        run: |
          # Extract v0.12.0 from release/v0.12.0
          VERSION_TAG=${GITHUB_HEAD_REF#release/}
          echo "version=$VERSION_TAG" >> $GITHUB_OUTPUT
          
          # Git Tagging
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $VERSION_TAG
          git push origin $VERSION_TAG

  docker-build:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for DB
        id: meta-db
        uses: docker/metadata-action@v5
        with:
          images: |
            flomp/wanderer-db
            ghcr.io/${{ github.repository }}/wanderer-db
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.publish.outputs.version }}

      - name: Build and push DB Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./db
          push: true
          tags: ${{ steps.meta-db.outputs.tags }}
          labels: ${{ steps.meta-db.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      - name: Extract metadata (tags, labels) for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: |
            flomp/wanderer-web
            ghcr.io/${{ github.repository }}/wanderer-web
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.publish.outputs.version }}

      - name: Build and push Web Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      - name: Extract metadata (tags, labels) for Docs
        id: meta-docs
        uses: docker/metadata-action@v5
        with:
          images: |
            flomp/wanderer-docs
            ghcr.io/${{ github.repository }}/wanderer-docs
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.publish.outputs.version }}

      - name: Build and push Docs Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./docs
          push: true
          tags: ${{ steps.meta-docs.outputs.tags }}
          labels: ${{ steps.meta-docs.outputs.labels }}
          platforms: linux/amd64,linux/arm64

  release:
    needs: [publish, docker-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract release notes
        id: changelog
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          # Clean 'v' from v0.12.0 for awk if your changelog uses 0.12.0
          RAW_VER=${VERSION#v}
          CHANGELOG=$(awk -v ver="$RAW_VER" 'BEGIN {in_section=0} /^# / {if (in_section) exit; if ($2 == ver) in_section=1} in_section {print}' CHANGELOG.md)
          echo 'changelog<<EOF' >> $GITHUB_OUTPUT
          printf "$CHANGELOG" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.publish.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
